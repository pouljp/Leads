<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disparador de Leads</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 680px;
        }
        h2 { color: #075E54; margin-top: 0; font-size: 24px; border-bottom: 2px solid #e1e4e8; padding-bottom: 10px;}
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #4a5568; }
        textarea {
            width: 100%;
            height: 280px;
            padding: 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        textarea:focus { border-color: #25D366; outline: none; background-color: #fff; }
        .form-group { margin-bottom: 24px; }
        .btn-submit {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover { background-color: #128C7E; }
        .file-box {
            border: 2px dashed #cbd5e0;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            background: #f8fafc;
        }
        .alert {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        .alert-warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Disparador de Leads Automatizado</h2>
    <p style="color: #718096;">O sistema salva sua mensagem em tempo real e faz disparos lentos simulando você digitando.</p>
    
    <form id="leadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="mensagem">Texto da Mensagem (Editável):</label>
            <textarea id="mensagem" name="mensagem" oninput="salvarMensagemAutomatico()">{{ mensagem }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="file">Importar Planilha (.xlsx, .xls ou .csv):</label>
            <div class="file-box">
                <input type="file" id="file" name="file" accept=".xlsx, .xls, .csv" required>
            </div>
        </div>
        
        <button type="submit" class="btn-submit">Iniciar Envio das Mensagens</button>
    </form>
    
    <div id="aviso" class="alert alert-warning">
        <strong>⚠️ ATENÇÃO:</strong> Os disparos começaram! O sistema vai controlar seu navegador.
        <strong>Não mexa no mouse ou no teclado</strong> até terminar o processo.
    </div>
</div>

<script>
    function salvarMensagemAutomatico() {
        const textoAtual = document.getElementById('mensagem').value;
        fetch('/salvar_mensagem', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: textoAtual })
        });
    }

    document.getElementById('leadForm').onsubmit = function() {
        document.getElementById('aviso').style.display = 'block';
    };
</script>

</body>
</html>
